# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance

appearance:
  theme_day: ai4m
#  theme_night:
  font: ai4m
  font_size: S # M # L

# SEO

marketing:
  seo:
    site_type: Organization
    local_business_type: ''
    org_name: ''
    description: ''
    twitter: 'GetResearchDev'
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    google_tag_manager: ''
    microsoft_clarity: ''
  verification:
    google: ''
    baidu: ''

# Site header

header:
  navbar:
    enable: true
    align: r
    show_logo: true
    show_language: false
    show_day_night: true
    show_search: false
    highlight_active_link: false

# Site footer

#footer:
#  copyright:
#    notice: '© {year} Me. This work is licensed under {license}'
#    license:
#      enable: true
#      allow_derivatives: false
#      share_alike: true
#      allow_commercial: false

lab_info:
  lab_full_name: Department of Architecture, College of Design and Engineering, National University of Singapore
  address: Department of Architecture, College of Design and Engineering, National University of Singapore, Singapore 117566
  social_links:
    - name: 'Facebook'
      icon: 'fab fa-facebook'
      url: 'https://www.facebook.com/'
    - name: 'Twitter'
      icon: 'fab fa-twitter'
      url: 'https://twitter.com/'
    - name: 'LinkedIn'
      icon: 'fab fa-linkedin'
      url: 'https://www.linkedin.com/'
    - name: 'YouTube'
      icon: 'fab fa-youtube'
      url: 'https://www.youtube.com/'
    - name: 'GitHub'
      icon: 'fab fa-github'
      url: 'https://github.com/'


# Localization

locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'
  address_format: en-us

# Site features

features:
  syntax_highlighter:
    enable: false
    extra_languages:
      - r
      - latex
  math:
    enable: false
  privacy_pack:
    enable: false
  repository:
    url: 'https://github.com/<username>/<repository>'
    content_dir: content
    branch: main
  avatar:
    gravatar: false
    shape: circle
  comment:
    provider: ''
    disqus:
      shortname: ''
      show_count: true
    commento:
      url: ''
    giscus:
      repo: ''
      repo_id: ''
      category: ''
      category_id: ''
  search:
    provider: wowchemy
    algolia:
      app_id: ''
      api_key: ''
      index_name: ''
      show_logo: false
  map:
    provider: 'mapnik'
    api_key: ''
    zoom: 15

# Extensions

extensions:
  decap_cms:
    branch: main
    local_backend: false
  academicons:
    enable: true

# Citation style

publications:
  date_format: January 2006
  citation_style: apa
